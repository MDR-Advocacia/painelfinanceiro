services:
  backend:
    build: 
      context: ./backend-mdr
    container_name: painelfinanceiro_back
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - TZ=America/Fortaleza
    # O Gunicorn definido no seu Dockerfile vai rodar na porta 8080 internamente

  frontend:
    build: 
      context: .
      args:
        # Passamos a variável nativa do Coolify que contém o link do backend
        - VITE_API_URL=${SERVICE_URL_BACKEND}
    container_name: painelfinanceiro_front
    depends_on:
      - backend
    # O Nginx definido no seu Dockerfile vai rodar na porta 80 internamente
